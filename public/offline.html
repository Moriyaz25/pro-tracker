<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1976D2" />
  <title>Offline · PRO Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Inter,system-ui,sans-serif; background:#f5f8fc; color:#0f2942; min-height:100dvh; display:flex; align-items:center; justify-content:center; margin:0; padding:24px; padding-top:max(24px,env(safe-area-inset-top)); padding-bottom:max(24px,env(safe-area-inset-bottom)); }
    .box { width:100%; max-width:360px; text-align:center; border:1px solid #d8e2ec; border-radius:24px; background:#fff; padding:32px 24px; box-shadow:0 16px 45px rgba(15,71,126,.09); }
    .icon { width:64px; height:64px; display:grid; place-items:center; margin:0 auto 18px; border-radius:20px; background:#eaf3fb; color:#1976d2; font-size:28px; font-weight:800; }
    h1 { font-size:1.35rem; margin:0 0 8px; }
    p { color:#64748b; font-size:.9rem; line-height:1.55; margin:0 0 22px; }
    button { width:100%; min-height:48px; border:0; border-radius:12px; background:#1976d2; color:#fff; font:inherit; font-size:.9rem; font-weight:700; }
  </style>
</head>
<body>
  <main class="box">
    <div class="icon">!</div>
    <h1>You&apos;re offline</h1>
    <p>Reconnect to the internet to load live duty, location and visit information.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
